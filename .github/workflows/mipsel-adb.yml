name: Build adb (mipsel-muslsf, via android-tools-static meson)
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build cmake git patch

      - name: Get mipsel musl softfloat toolchain
        run: |
          wget https://github.com/lmq8267/Toolchain/releases/download/musl-cross/mipsel-linux-muslsf-cross.tgz
          tar xf mipsel-linux-muslsf-cross.tgz
          echo "$PWD/mipsel-linux-muslsf-cross/bin" >> $GITHUB_PATH

      - name: Get latest release source archive
        run: |
          wget https://github.com/meator/android-tools-static/releases/download/35.0.2-rc.1/android-tools-static-35.0.2-rc.1-src.tar.gz
          tar xf android-tools-static-35.0.2-rc.1-src.tar.gz
          mv android-tools-static-* android-tools-static || true
          ls

      - name: Write meson cross-file for mipsel-muslsf
        run: |
          cat > mipsel-muslsf.ini << 'EOF'
          [binaries]
          c = 'mipsel-linux-muslsf-gcc'
          cpp = 'mipsel-linux-muslsf-g++'
          ar = 'mipsel-linux-muslsf-ar'
          strip = 'mipsel-linux-muslsf-strip'
          pkg-config = 'pkg-config'

          [host_machine]
          system = 'linux'
          cpu_family = 'mips'
          cpu = 'mipsel'
          endian = 'little'
          EOF

      - name: Configure
        run: |
          cd android-tools-static
          meson setup build --cross-file=../mipsel-muslsf.ini --default-library=static

      - name: Build
        run: |
          cd android-tools-static
          meson compile -C build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: adb-mipsel-muslsf
          path: android-tools-static/build/adb/adb
